{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Fabrique - Étape 01</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600&family=Manrope:wght@600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">

<style>
/* =========================================
   Variables CSS (Design System)
   ========================================= */
:root {
  /* Couleurs */
  --bg-main: #FFFBFF;
  --bg-input: #EFEEE3;
  --bg-progress-track: #ECE9D1;
  --text-dark: #39382B;
  --text-muted: #666556;
  --text-placeholder: rgba(101, 101, 94, 0.50);
  --color-primary: #237329;
  --color-primary-dark: #3E6E59;
  --color-accent: #A24A33;
  --color-white: #FFFFFF;
  --blur-color: rgba(157, 241, 151, 0.30);

  /* Polices */
  --font-title: 'Plus Jakarta Sans', sans-serif;
  --font-body: 'Be Vietnam Pro', sans-serif;
  --font-input: 'Manrope', sans-serif;
}

/* =========================================
   Reset basique
   ========================================= */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background-color: #f0f0f0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* =========================================
   Layout principal (Simili-Mobile)
   ========================================= */
.app-container {
  width: 390px;
  height: 725px;
  position: relative;
  background: var(--bg-main);
  overflow: hidden;
  font-family: var(--font-body);
  display: flex;
  flex-direction: column;
}

.decorative-blur {
  width: 256px;
  height: 256px;
  position: absolute;
  left: 173px;
  top: -82px;
  background: var(--blur-color);
  border-radius: 50%;
  filter: blur(32px);
  z-index: 0;
  pointer-events: none;
}

.scrollable-content {
  flex: 1;
  overflow-y: auto;
  position: relative;
  z-index: 1;
  padding: 48px 24px 100px 24px; /* Padding bottom généreux pour la barre sticky */
}

/* =========================================
   En-tête (Marque)
   ========================================= */
.header-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 56px;
}

.brand-logo {
  width: 32px;
  height: 32px;
  background: var(--color-primary);
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.logo-inner {
  width: 13.5px;
  height: 13.5px;
  background: var(--color-white);
}

.brand-name {
  color: var(--text-dark);
  font-size: 24px;
  font-family: var(--font-title);
  font-weight: 800;
}

/* =========================================
   Contenu de l'étape
   ========================================= */
.onboarding-step {
  display: flex;
  flex-direction: column;
  gap: 32px;
}

/* Progression */
.progress-container {
  display: flex;
  align-items: center;
  gap: 16px;
}

.progress-track {
  width: 249px;
  height: 4px;
  background: var(--bg-progress-track);
  border-radius: 9999px;
  overflow: hidden;
}

.progress-fill {
  width: 33.33%; /* Étape 1 sur 3 */
  height: 100%;
  background: var(--color-primary);
  border-radius: 9999px;
}

.progress-text {
  color: var(--color-primary-dark);
  font-size: 12px;
  font-family: var(--font-title);
  font-weight: 700;
  letter-spacing: 0.5px;
}

/* Textes */
.step-header {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.step-title {
  color: var(--text-dark);
  font-size: 24px;
  font-family: var(--font-title);
  font-weight: 700;
  line-height: 1.3;
}

.step-subtitle {
  color: var(--text-muted);
  font-size: 16px;
  line-height: 1.5;
}

/* Formulaire */
.step-form {
  display: flex;
  flex-direction: column;
}

.input-pill {
  width: 100%;
  height: 56px;
  background: var(--bg-input);
  border: none;
  border-radius: 9999px;
  padding: 0 24px;
  font-size: 16px;
  font-family: var(--font-input);
  font-weight: 600;
  color: var(--text-dark);
  outline: none;
  transition: box-shadow 0.2s ease;
}

.input-pill::placeholder {
  color: var(--text-placeholder);
}

.input-pill:focus {
  box-shadow: 0 0 0 2px var(--color-primary);
}

/* =========================================
   Barre d'actions (Sticky Footer)
   ========================================= */
.bottom-actions {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 24px;
  background: rgba(255, 255, 255, 0.80);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 10;
}

.btn-skip {
  background: transparent;
  border: none;
  padding: 16px 8px;
  color: var(--text-muted);
  font-size: 14px;
  font-family: var(--font-body);
  font-weight: 600;
  cursor: pointer;
}

.btn-skip:hover {
  color: var(--text-dark);
}

.btn-next {
  background: var(--color-accent);
  border: none;
  border-radius: 9999px;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--color-white);
  font-size: 16px;
  font-family: var(--font-title);
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0px 10px 15px -3px rgba(162, 74, 51, 0.30);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.btn-next:hover {
  transform: translateY(-2px);
  box-shadow: 0px 12px 18px -3px rgba(162, 74, 51, 0.40);
}

.icon-arrow {
  width: 6px;
  height: 10px;
  background: var(--color-white);
  clip-path: polygon(0 0, 100% 50%, 0 100%); /* Fausse icône flèche en pur CSS */
}
</style>

</head>
<body>

  <main class="app-container">
    <div class="decorative-blur"></div>

    <div class="scrollable-content">
      <header class="header-brand">
        <div class="brand-logo"><div class="logo-inner"></div></div>
        <span class="brand-name">La Fabrique</span>
      </header>

      <section class="onboarding-step">
        
        <div class="progress-container">
          <div class="progress-track">
            <div class="progress-fill"></div>
          </div>
          <span class="progress-text">ETAPE 01/03</span>
        </div>

        <div class="step-header">
          <h1 class="step-title">Comment on vous appelle ?</h1>
          <p class="step-subtitle">Ton matricule officiel de dompteur de fibres.</p>
        </div>

        <form class="step-form" id="form-etape-1" method="POST">
        {% csrf_token %}
          <input type="text" name="username"class="input-pill" placeholder="nom d’utilisateur" required>
        </form>

      </section>
    </div>

    <footer class="bottom-actions">
      <button type="button" class="btn-skip">Passer</button>
      <button type="submit" class="btn-next" form="form-etape-1">
        Etape suivante
        <span class="icon-arrow"></span>
      </button>
    </footer>
  </main>

</body>
</html>
