{% load static %}
<style>
  .bottom-nav {
    background: #FEFCF3;
    border-top: 1.5px solid #EEEDE3;
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 4px;
    padding-bottom: env(safe-area-inset-bottom, 0px);
    z-index: 20;
    flex-shrink: 0;
    position: relative;
    min-height: 72px;
  }

  /* ── Onglet standard ── */
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    flex: 1;
    text-decoration: none;
    color: #B3B2A4;
    padding: 8px 0 10px;
    height: 72px;
    transition: color 0.15s ease;
  }

  .nav-item.active { color: var(--color-primary); }

  .nav-icon-bg {
    width: 44px;
    height: 44px;
    min-width: 44px;
    min-height: 44px;
    flex-shrink: 0;
    aspect-ratio: 1;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    transition: background 0.15s ease;
  }

  .nav-item.active .nav-icon-bg { background: #D2F4D1; }

  .nav-item svg {
    width: 23px;
    height: 23px;
    flex-shrink: 0;
    fill: currentColor;
  }

  .nav-label {
    font-family: 'Manrope', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    line-height: 1;
  }

  /* ── Scanner ── */
  .nav-scanner-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;  /* label collé en bas comme les autres */
    gap: 5px;
    text-decoration: none;
    padding-bottom: 10px;
    height: 72px;
    color: #B3B2A4;             /* gris par défaut */
  }

  .nav-scanner-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(160deg, #43A047 0%, #2E7D32 100%);
    box-shadow: 0 5px 0 #1B5E20, 0 10px 24px rgba(35,115,41,0.35);
    margin-top: -62px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
    transition: transform 0.08s, box-shadow 0.08s;
    overflow: hidden;
    border: none;
    color: white;
  }

  .nav-scanner-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 55%);
    border-radius: inherit;
    pointer-events: none;
  }

  .nav-scanner-wrapper:active .nav-scanner-btn {
    transform: translateY(4px);
    box-shadow: 0 1px 0 #1B5E20, 0 4px 10px rgba(35,115,41,0.20);
  }

  .nav-scanner-btn svg {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    fill: currentColor;
  }

  .nav-scanner-label {
    font-family: 'Manrope', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    line-height: 1;
    color: #B3B2A4;
  }

  .nav-scanner-wrapper.active .nav-scanner-label {
    color: var(--color-primary);
  }

  /* Badge notification */
  .nav-badge-wrap { position: relative; display: inline-flex; }
  .nav-badge {
    position: absolute;
    top: -3px; right: -6px;
    min-width: 15px; height: 15px;
    background: #E53935;
    border-radius: 8px;
    border: 2px solid #FEFCF3;
    font-size: 7px; font-weight: 700; color: white;
    display: flex; align-items: center; justify-content: center;
    padding: 0 2px; line-height: 1;
  }
</style>
