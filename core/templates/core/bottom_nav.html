{% load static %}
<style>
  /* =========================================
     Barre de navigation inférieure
     ========================================= */
  .bottom-nav {
    background: #FEFCF3;
    border-top: 1.5px solid #EEEDE3;
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 4px;
    padding-bottom: env(safe-area-inset-bottom, 0px);
    z-index: 20;
    flex-shrink: 0;
    position: relative;
    min-height: 72px;
  }

  /* Onglet standard */
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    gap: 4px;
    flex: 1;
    text-decoration: none;
    color: #B3B2A4;
    padding: 8px 0 10px;
    height: 72px;
    transition: color 0.15s ease;
  }

  .nav-item.active {
    color: var(--color-primary);
  }

  .nav-item.active .nav-icon-bg {
    background: #D2F4D1;
  }

  .nav-icon-bg {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    transition: background 0.15s ease;
  }

  .nav-item svg {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }

  .nav-label {
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1px;
    line-height: 1;
  }

  /* ── Scanner — bouton rond ── */
  .nav-scanner-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    text-decoration: none;
    padding-bottom: 10px;
    height: 72px;
  }

  .nav-scanner-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(160deg, #43A047 0%, #2E7D32 100%);
    box-shadow: 0 5px 0 #1B5E20, 0 10px 24px rgba(35,115,41,0.35);
    margin-top: -42px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
    transition: transform 0.08s, box-shadow 0.08s;
    transform: translateY(0);
    overflow: hidden;
    border: none;
  }

  .nav-scanner-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 55%);
    border-radius: inherit;
    pointer-events: none;
  }

  .nav-scanner-wrapper:active .nav-scanner-btn {
    transform: translateY(4px);
    box-shadow: 0 1px 0 #1B5E20, 0 4px 10px rgba(35,115,41,0.20);
  }

  .scanner-icon {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .nav-scanner-label {
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 700;
    color: var(--color-primary);
    letter-spacing: 0.1px;
    line-height: 1;
  }

  /* Badge notification (communauté) */
  .nav-badge-wrap {
    position: relative;
    display: inline-flex;
  }

  .nav-badge {
    position: absolute;
    top: -3px;
    right: -6px;
    min-width: 15px;
    height: 15px;
    background: #E53935;
    border-radius: 8px;
    border: 2px solid #FEFCF3;
    font-size: 7px;
    font-weight: 700;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 2px;
    line-height: 1;
  }
</style>

<nav class="bottom-nav">

  <!-- 1. Accueil -->
  <a href="{% url 'dashboard' %}" class="nav-item {% if nav_active == 'accueil' %}active{% endif %}">
    <div class="nav-icon-bg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
        <polyline points="9,21 9,12 15,12 15,21"/>
      </svg>
    </div>
    <span class="nav-label">Accueil</span>
  </a>

  <!-- 2. Mes tissus -->
  <a href="{% url 'mes_tissus' %}" class="nav-item {% if nav_active == 'tissus' %}active{% endif %}">
    <div class="nav-icon-bg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.57a1 1 0 00.99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 002-2V10h2.15a1 1 0 00.99-.84l.58-3.57a2 2 0 00-1.34-2.23z"/>
      </svg>
    </div>
    <span class="nav-label">Mes tissus</span>
  </a>

  <!-- 3. Scanner — bouton gamifié -->
  <a href="{% url 'ajout_textile' %}" class="nav-scanner-wrapper">
    <div class="nav-scanner-btn">
      <svg class="scanner-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </div>
    <span class="nav-scanner-label">Scanner</span>
  </a>

  <!-- 4. Patrons -->
  <a href="{% url 'patrons' %}" class="nav-item {% if nav_active == 'patrons' %}active{% endif %}">
    <div class="nav-icon-bg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
      </svg>
    </div>
    <span class="nav-label">Patrons</span>
  </a>

  <!-- 5. Communauté -->
  <a href="{% url 'communaute' %}" class="nav-item {% if nav_active == 'communaute' %}active{% endif %}">
    <div class="nav-icon-bg">
      <div class="nav-badge-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87"/>
          <path d="M16 3.13a4 4 0 010 7.75"/>
        </svg>
        {# <span class="nav-badge">3</span> #}
      </div>
    </div>
    <span class="nav-label">Communauté</span>
  </a>

</nav>
