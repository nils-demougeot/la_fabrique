<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Démo caméra</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      color: white;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
      gap: 16px;
    }

    h1 { font-size: 18px; font-weight: 600; }

    /* ── Viewfinder ── */
    #viewfinder {
      position: relative;
      width: 100%;
      max-width: 390px;
      aspect-ratio: 3 / 4;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Fond semi-transparent autour du carré */
    .overlay-mask {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Le carré de crop — centré, 70% de la largeur */
    #crop-box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70%;
      aspect-ratio: 1;
      border: 2px solid white;
      border-radius: 4px;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.45);
    }

    /* Coins stylisés */
    #crop-box::before, #crop-box::after,
    .corner-br, .corner-bl {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: white;
      border-style: solid;
    }
    #crop-box::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 2px 0 0 0; }
    #crop-box::after  { top: -2px; right: -2px; border-width: 3px 3px 0 0; border-radius: 0 2px 0 0; }
    .corner-br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 2px 0; }
    .corner-bl { bottom: -2px; left: -2px;  border-width: 0 0 3px 3px; border-radius: 0 0 0 2px; }

    /* ── Boutons ── */
    button {
      width: 100%;
      max-width: 390px;
      padding: 14px;
      border: none;
      border-radius: 9999px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:active { opacity: 0.8; }

    #btn-start   { background: #237329; color: white; }
    #btn-capture { background: white;   color: #111; display: none; }
    #btn-reset   { background: #555;    color: white; display: none; }

    /* ── Résultat ── */
    #result-section {
      width: 100%;
      max-width: 390px;
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    #result-section p { font-size: 14px; color: #aaa; text-align: center; }
    #result-canvas {
      width: 100%;
      border-radius: 12px;
      display: block;
    }

    #error-msg {
      color: #ff6b6b;
      font-size: 14px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

  <h1>Démo caméra + crop</h1>

  <div id="viewfinder">
    <video id="video" autoplay playsinline muted></video>
    <div class="overlay-mask">
      <div id="crop-box">
        <span class="corner-br"></span>
        <span class="corner-bl"></span>
      </div>
    </div>
  </div>

  <p id="error-msg"></p>

  <button id="btn-start">Ouvrir la caméra</button>
  <button id="btn-capture">Prendre la photo</button>
  <button id="btn-reset">Recommencer</button>

  <div id="result-section">
    <p>Zone capturée :</p>
    <canvas id="result-canvas"></canvas>
  </div>

  <canvas id="hidden-canvas" style="display:none;"></canvas>

  <script>
    const video       = document.getElementById('video');
    const cropBox     = document.getElementById('crop-box');
    const btnStart    = document.getElementById('btn-start');
    const btnCapture  = document.getElementById('btn-capture');
    const btnReset    = document.getElementById('btn-reset');
    const resultSec   = document.getElementById('result-section');
    const resultCanvas= document.getElementById('result-canvas');
    const hiddenCanvas= document.getElementById('hidden-canvas');
    const errorMsg    = document.getElementById('error-msg');

    let stream = null;

    // ── Ouvrir la caméra ──
    btnStart.addEventListener('click', async () => {
      errorMsg.style.display = 'none';
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
          audio: false
        });
        video.srcObject = stream;
        btnStart.style.display   = 'none';
        btnCapture.style.display = 'block';
      } catch (err) {
        errorMsg.textContent = 'Impossible d\'accéder à la caméra : ' + err.message;
        errorMsg.style.display = 'block';
      }
    });

    // ── Prendre la photo et cropper ──
    btnCapture.addEventListener('click', () => {
      const viewfinder = document.getElementById('viewfinder');

      // Dimensions réelles de la vidéo
      const videoW = video.videoWidth;
      const videoH = video.videoHeight;

      // Dimensions affichées du viewfinder et du crop-box
      const vfRect   = viewfinder.getBoundingClientRect();
      const boxRect  = cropBox.getBoundingClientRect();

      // Ratio entre pixels vidéo réels et pixels CSS affichés
      // (object-fit: cover — on calcule le scale effectif)
      const scaleX = videoW / vfRect.width;
      const scaleY = videoH / vfRect.height;
      // object-fit:cover affiche à max(cW/vW, cH/vH), donc 1 CSS px = min(vW/cW, vH/cH) pixels vidéo
      const scale  = Math.min(scaleX, scaleY);

      // Offset dû au centrage de cover
      const renderedW = videoW / scale;
      const renderedH = videoH / scale;
      const offsetX   = (vfRect.width  - renderedW) / 2;
      const offsetY   = (vfRect.height - renderedH) / 2;

      // Position du crop-box dans le référentiel du viewfinder
      const relX = boxRect.left - vfRect.left;
      const relY = boxRect.top  - vfRect.top;

      // Conversion en coordonnées pixels vidéo
      const srcX = (relX - offsetX) * scale;
      const srcY = (relY - offsetY) * scale;
      const srcW = boxRect.width  * scale;
      const srcH = boxRect.height * scale;

      // Dessin sur le canvas caché puis copie vers le canvas résultat
      hiddenCanvas.width  = srcW;
      hiddenCanvas.height = srcH;
      const ctx = hiddenCanvas.getContext('2d');
      ctx.drawImage(video, srcX, srcY, srcW, srcH, 0, 0, srcW, srcH);

      resultCanvas.width  = srcW;
      resultCanvas.height = srcH;
      resultCanvas.getContext('2d').drawImage(hiddenCanvas, 0, 0);

      // Arrêter la caméra et afficher le résultat
      stream.getTracks().forEach(t => t.stop());
      video.srcObject = null;

      btnCapture.style.display = 'none';
      btnReset.style.display   = 'block';
      resultSec.style.display  = 'flex';
    });

    // ── Recommencer ──
    btnReset.addEventListener('click', () => {
      resultSec.style.display  = 'none';
      btnReset.style.display   = 'none';
      btnStart.style.display   = 'block';
    });
  </script>

</body>
</html>
