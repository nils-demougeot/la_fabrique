<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D1EEF4"/>
      <stop offset="100%" style="stop-color:#7FC9CF"/>
    </linearGradient>
    <linearGradient id="denimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5C8AC0"/>
      <stop offset="100%" style="stop-color:#3A6090"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="690" cy="130" r="130" fill="#A8DCE4" opacity="0.35"/>
  <circle cx="80" cy="690" r="110" fill="#60B0BA" opacity="0.25"/>

  <!-- Denim fabric (jeans) background patch -->
  <rect x="180" y="180" width="440" height="440" rx="20" fill="url(#denimGrad)"/>
  <!-- Denim texture lines -->
  <g stroke="#4A78B0" stroke-width="1" opacity="0.5">
    <line x1="180" y1="200" x2="620" y2="200"/>
    <line x1="180" y1="218" x2="620" y2="218"/>
    <line x1="180" y1="236" x2="620" y2="236"/>
    <line x1="180" y1="254" x2="620" y2="254"/>
    <line x1="180" y1="272" x2="620" y2="272"/>
    <line x1="180" y1="290" x2="620" y2="290"/>
    <line x1="180" y1="308" x2="620" y2="308"/>
    <line x1="180" y1="326" x2="620" y2="326"/>
    <line x1="180" y1="344" x2="620" y2="344"/>
    <line x1="180" y1="362" x2="620" y2="362"/>
    <line x1="180" y1="380" x2="620" y2="380"/>
    <line x1="180" y1="398" x2="620" y2="398"/>
    <line x1="180" y1="416" x2="620" y2="416"/>
    <line x1="180" y1="434" x2="620" y2="434"/>
    <line x1="180" y1="452" x2="620" y2="452"/>
    <line x1="180" y1="470" x2="620" y2="470"/>
    <line x1="180" y1="488" x2="620" y2="488"/>
    <line x1="180" y1="506" x2="620" y2="506"/>
    <line x1="180" y1="524" x2="620" y2="524"/>
    <line x1="180" y1="542" x2="620" y2="542"/>
    <line x1="180" y1="560" x2="620" y2="560"/>
    <line x1="180" y1="578" x2="620" y2="578"/>
    <line x1="180" y1="596" x2="620" y2="596"/>
  </g>
  <!-- Diagonal weave -->
  <g stroke="#6090B8" stroke-width="0.8" opacity="0.3">
    <line x1="180" y1="620" x2="400" y2="180"/>
    <line x1="220" y1="620" x2="440" y2="180"/>
    <line x1="260" y1="620" x2="480" y2="180"/>
    <line x1="300" y1="620" x2="520" y2="180"/>
    <line x1="340" y1="620" x2="560" y2="180"/>
    <line x1="380" y1="620" x2="600" y2="180"/>
    <line x1="420" y1="620" x2="620" y2="260"/>
    <line x1="460" y1="620" x2="620" y2="320"/>
    <line x1="180" y1="340" x2="360" y2="620"/>
    <line x1="180" y1="400" x2="300" y2="620"/>
  </g>

  <!-- Torn/hole area in center -->
  <ellipse cx="400" cy="400" rx="80" ry="65" fill="#2A5080" opacity="0.7"/>
  <path d="M 330,385 Q 345,370 360,380 Q 375,365 390,378 Q 400,360 415,375 Q 430,362 445,378 Q 460,365 472,382 Q 468,395 460,405 Q 472,415 466,430 Q 450,445 435,432 Q 420,448 405,435 Q 390,450 375,438 Q 360,452 345,440 Q 332,425 335,410 Q 322,400 330,385 Z"
        fill="#1A3A60" opacity="0.8"/>

  <!-- Sashiko stitching pattern around the hole -->
  <!-- White stitching lines (visible mending) -->
  <g stroke="#F0E8D0" stroke-width="3" stroke-linecap="round" stroke-dasharray="8,5">
    <!-- Horizontal stitches -->
    <line x1="250" y1="330" x2="550" y2="330"/>
    <line x1="250" y1="355" x2="550" y2="355"/>
    <line x1="250" y1="445" x2="550" y2="445"/>
    <line x1="250" y1="470" x2="550" y2="470"/>
    <!-- Vertical stitches -->
    <line x1="310" y1="280" x2="310" y2="520"/>
    <line x1="335" y1="280" x2="335" y2="520"/>
    <line x1="465" y1="280" x2="465" y2="520"/>
    <line x1="490" y1="280" x2="490" y2="520"/>
  </g>

  <!-- Diagonal sashiko pattern (diamond grid) -->
  <g stroke="#E8D8B0" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6,6" opacity="0.8">
    <line x1="250" y1="280" x2="550" y2="520"/>
    <line x1="290" y1="280" x2="550" y2="480"/>
    <line x1="330" y1="280" x2="550" y2="440"/>
    <line x1="250" y1="320" x2="550" y2="560"/>
    <line x1="250" y1="360" x2="470" y2="520"/>
    <line x1="550" y1="280" x2="250" y2="520"/>
    <line x1="510" y1="280" x2="250" y2="480"/>
    <line x1="470" y1="280" x2="250" y2="440"/>
    <line x1="550" y1="320" x2="250" y2="560"/>
    <line x1="550" y1="360" x2="330" y2="520"/>
  </g>

  <!-- White stitching over hole (repair visible) -->
  <g stroke="#FFFDE0" stroke-width="3.5" stroke-linecap="round">
    <line x1="355" y1="375" x2="370" y2="360"/>
    <line x1="375" y1="370" x2="390" y2="355"/>
    <line x1="395" y1="368" x2="410" y2="353"/>
    <line x1="415" y1="370" x2="430" y2="355"/>
    <line x1="435" y1="375" x2="448" y2="365"/>
    <line x1="355" y1="400" x2="370" y2="410"/>
    <line x1="375" y1="405" x2="390" y2="415"/>
    <line x1="395" y1="405" x2="410" y2="415"/>
    <line x1="415" y1="402" x2="430" y2="415"/>
    <line x1="435" y1="398" x2="448" y2="410"/>
  </g>

  <!-- Needle with thread (top right) -->
  <g transform="translate(640, 200) rotate(-45)">
    <rect x="-4" y="-80" width="8" height="150" rx="4" fill="#D4C8A0"/>
    <ellipse cx="0" cy="-62" rx="3" ry="6" fill="#B0A070"/>
    <polygon points="0,-80 -4,68 0,85 4,68" fill="#C8BC90"/>
    <path d="M 0,-57 Q 30,-20 25,40 Q 18,80 35,120" stroke="#F0E8D0" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Label -->
  <rect x="180" y="660" width="440" height="60" rx="12" fill="#2A6080" opacity="0.88"/>
  <text x="400" y="698" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="white" letter-spacing="2">RÉPARATION</text>
</svg>
